<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#EFE4CC" />
  <title>Nyt Eventyr</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Nyt Eventyr" />
  <script>
    // Kører synkront, før CSS males, for at undgå et blink af det forkerte
    // layout. Capacitor's native runtime indsprøjter et window.Capacitor-
    // objekt i siden, selv når den (som her) loader en fjern-URL — det er
    // sådan appen kan skelne "kører i den native app-skal" fra "kører i en
    // almindelig browser-fane", uden at have @capacitor/core som afhængighed.
    if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) {
      document.documentElement.classList.add("is-native-app");
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="device">
    <div class="device-notch"></div>
    <div class="device-status">
      <span class="status-time">9:41</span>
      <span class="status-icons">
        <span class="status-dot"></span>
        <span class="status-dot"></span>
        <span class="status-dot dim"></span>
      </span>
    </div>
    <div id="app"></div>
  </div>

  <div id="modal-root"></div>
  <div id="sheet-root"></div>
  <div id="picker-root"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
